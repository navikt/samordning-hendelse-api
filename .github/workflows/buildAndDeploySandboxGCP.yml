name: Build and Deploy Sandbox GCP

on:
  push:
    branches:
      - sandboxgcp
  workflow_dispatch:
    inputs:
      switch_traffic:
        description: 'Flytt trafikk til GCP (kjør etter DB-migrering)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  build-and-deploy-sandbox:
    name: Build and Deploy Sandbox gcp
    permissions:
      contents: read
      id-token: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      # Checkout
      - uses: actions/checkout@v5
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      # Build
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: current
      - name: Build with Gradle
        run: gradle build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build image
      - name: Nais docker-build
        uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: pensjonsamhandling
          tag: ${{ github.event.repository.name }}-sandbox

      # Deploy app
      - name: Deploy to dev-gcp
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: nais/dev-gcp.yaml
          IMAGE: ${{ steps.docker-build-push.outputs.image }}
          TELEMETRY: ${{ steps.docker-build-push.outputs.telemetry }}
          TIMEOUT: 20m

      - name: Deploy person-endring Topic Q2
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: nais/topic/person-endring-dev.yml
          TEAM: pensjonsamhandling

      - name: Deploy manglende-refusjonskrav Topic Q2
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: nais/topic/manglende-refusjonskrav-dev.yml
          TEAM: pensjonsamhandling

      # Trafikkswitch — kjøres kun manuelt etter at DB-migrering er fullført
      - name: Switch traffic to GCP (KrakenD + ApiEndpoints)
        if: ${{ github.event.inputs.switch_traffic == 'true' }}
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: nais/apiendpoints/krakend-q2.yaml,nais/apiendpoints/apiendpoints-dev-gcp.yaml
