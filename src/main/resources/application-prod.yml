tpconfig.url: https://tp.prod-fss-pub.nais.io/api/tpconfig

oauth2:
  maskinporten:
    issuer: https://maskinporten.no/
    jwkSetUri: https://maskinporten.no/jwk
  sts:
    issuer: https://security-token-service.nais.adeo.no
    jwkSetUri: https://security-token-service.nais.adeo.no/rest/v1/sts/jwks


VEDTAK_HENDELSE_KAFKA_TOPIC: pensjonsamhandling.sam-vedtak-hendelser-p
YTELSE_HENDELSE_KAFKA_TOPIC: pensjonsamhandling.tp-hendelser
PERSON_ENDRING_KAFKA_TOPIC: pensjonsamhandling.person-endring
MANGLENDE_REFUSJONSKRAV_KAFKA_TOPIC: pensjonsamhandling.manglende-refusjonskrav

MAX_POOL_SIZE: 5

spring:
  datasource:
    url: ${NAIS_DATABASE_SAMORDNING_HENDELSE_API_SAMORDNING_HENDELSER_JDBC_URL}
    hikari:
      maximum-pool-size: ${MAX_POOL_SIZE}
      minimum-idle: 1
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    validate-on-migrate: true
    baseline-on-migrate: true

